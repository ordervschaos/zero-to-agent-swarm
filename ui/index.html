<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Swarm</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-rows: 44px 1fr;
      overflow: hidden;
      font-size: 13px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }
    .status-dot.live { background: var(--green); }
    .status-label { font-size: 11px; color: var(--muted); }

    /* ── Main grid ── */
    main {
      display: grid;
      grid-template-rows: 44% 56%;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    /* ── Tasks panel (top-left) ── */
    #tasks-panel {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Artifacts panel (top-right) ── */
    #artifacts-panel {
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .artifacts-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .panel-title {
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .kanban {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      flex: 1;
      overflow: hidden;
      gap: 1px;
      background: var(--border);
    }

    .kanban-col {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .col-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
    }

    .col-count {
      background: var(--surface2);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      color: var(--muted);
    }

    .col-cards {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      border-left-width: 3px;
    }

    .task-card.status-open      { border-left-color: var(--muted); }
    .task-card.status-in_progress { border-left-color: var(--yellow); }
    .task-card.status-done      { border-left-color: var(--green); opacity: 0.65; }

    @keyframes card-flash {
      0%   { background: #1c3a52; border-color: var(--accent); }
      100% { background: var(--surface); }
    }
    .task-card.flash { animation: card-flash 1.2s ease-out; }

    .task-id    { font-size: 10px; color: var(--muted); margin-bottom: 3px; font-family: monospace; }
    .task-title { font-size: 12px; line-height: 1.45; }
    .task-meta  { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .task-result { font-size: 10px; color: var(--muted); margin-top: 3px; font-style: italic; }

    /* ── Chat panel ── */
    #chat-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .chat-header label { font-size: 11px; color: var(--muted); }

    select, input, button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      font-size: 12px;
      outline: none;
    }

    select { padding: 4px 8px; cursor: pointer; }
    select:focus { border-color: var(--accent); }

    button {
      padding: 4px 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 82%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1a3a5c;
      border: 1px solid #1e4a78;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .msg.system {
      align-self: center;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 11px;
      font-style: italic;
      max-width: 100%;
    }
    .msg-label { font-size: 10px; color: var(--accent); margin-bottom: 3px; font-weight: 600; }

    .chat-footer {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      padding: 6px 10px;
    }
    #chat-input:focus { border-color: var(--accent); }

    #send-btn {
      background: #1a3a5c;
      border-color: #1e4a78;
      padding: 6px 16px;
    }
    #send-btn:hover:not(:disabled) { background: #1e4a78; border-color: var(--accent); color: var(--text); }

    .thinking {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }
    .thinking span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.1s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.18s; }
    .thinking span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.55); opacity: 0.4; }
      40%           { transform: scale(1);    opacity: 1; }
    }

    /* ── Logs panel (bottom-right) ── */
    #logs-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Artifacts */
    .artifact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .artifact-key  { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 2px; }
    .artifact-meta { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .artifact-val  {
      font-size: 11px; color: var(--muted);
      white-space: pre-wrap; max-height: 56px;
      overflow: hidden; cursor: pointer;
      font-family: monospace;
    }
    .artifact-val.expanded { max-height: none; }

    /* Logs */
    #logs-pane {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 11px;
      gap: 1px;
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
    }

    .log-row {
      display: grid;
      grid-template-columns: 62px 72px 100px 1fr;
      gap: 6px;
      padding: 2px 4px;
      border-radius: 3px;
      align-items: baseline;
    }
    .log-row:hover { background: var(--surface2); }

    .log-time  { color: var(--muted); font-size: 10px; }
    .log-agent { color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-type  { color: var(--muted); }
    .log-type.tool            { color: var(--yellow); }
    .log-type.response        { color: var(--green); }
    .log-type.delegation_start,
    .log-type.delegation_end  { color: var(--purple); }
    .log-type.busy,
    .log-type.max_iterations  { color: var(--red); }
    .log-msg { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── View toggle (Tasks panel) ── */
    .panel-title {
      display: flex;
      align-items: center;
    }
    #tasks-panel .panel-title > span { flex: 1; }
    .view-toggle { display: flex; gap: 3px; margin-right: 6px; }
    .view-btn {
      background: transparent;
      border: 1px solid transparent;
      padding: 2px 8px;
      font-size: 10px;
      border-radius: 4px;
      cursor: pointer;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .view-btn.active { border-color: var(--border); color: var(--text); background: var(--surface2); }
    .view-btn:hover:not(.active) { color: var(--text); border-color: var(--border); }

    /* ── DAG tree view ── */
    .dag-view {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .dag-project { margin-bottom: 8px; }
    .dag-project-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 4px 4px;
    }

    /* ── DAG list items ── */
    .dag-list {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }
    .dag-list .dag-list {
      padding-left: 20px;
      margin-top: 2px;
    }
    ol.dag-list {
      list-style: none;
      counter-reset: dag-seq;
    }
    ol.dag-list > .dag-item::before {
      counter-increment: dag-seq;
      content: counter(dag-seq) ".";
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      margin-right: 6px;
      min-width: 18px;
      display: inline-block;
      text-align: right;
    }
    ul.dag-list > .dag-item::before {
      content: "\21C6";
      color: var(--purple);
      font-size: 11px;
      margin-right: 6px;
    }
    ul.dag-list {
      border-left: 2px solid var(--purple);
      margin-left: 6px;
      padding-left: 14px;
    }
    .dag-parallel-label {
      font-size: 9px;
      color: var(--purple);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 2px 0 1px;
    }

    .dag-item {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 4px;
      padding: 3px 4px;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.6;
      cursor: default;
    }
    .dag-item:hover { background: var(--surface2); }
    @keyframes dag-flash {
      0%   { background: #1c3a52; }
      100% { background: transparent; }
    }
    .dag-item.flash { animation: dag-flash 1.2s ease-out; }
    .dag-item.dag-container > .dag-title { font-weight: 600; }

    .dag-icon { flex-shrink: 0; font-size: 11px; }
    .dag-icon.open        { color: var(--muted); }
    .dag-icon.in_progress { color: var(--yellow); }
    .dag-icon.done        { color: var(--green); }

    .dag-title { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dag-title.done        { opacity: 0.5; text-decoration: line-through; }
    .dag-title.in_progress { color: var(--yellow); }

    .dag-assignee { font-size: 10px; color: var(--muted); flex-shrink: 0; }

    /* ── Timeline waterfall view (Chrome DevTools style) ── */
    .timeline-view {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    .timeline-header {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .timeline-header-label {
      width: 180px;
      min-width: 180px;
      padding: 5px 10px;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border-right: 1px solid var(--border);
    }
    .timeline-ruler {
      flex: 1;
      position: relative;
      height: 24px;
      min-width: 200px;
    }
    .timeline-tick {
      position: absolute;
      top: 0;
      bottom: 0;
      border-left: 1px solid var(--border);
    }
    .timeline-tick-label {
      position: absolute;
      top: 5px;
      left: 4px;
      font-size: 9px;
      color: var(--muted);
      white-space: nowrap;
      font-family: 'Menlo', 'Consolas', monospace;
    }

    .timeline-body {
      flex: 1;
      overflow-y: auto;
    }

    .timeline-row {
      display: flex;
      align-items: center;
      min-height: 28px;
      border-bottom: 1px solid rgba(48,54,61,0.4);
    }
    .timeline-row:hover { background: var(--surface2); }
    .timeline-row.is-container { background: rgba(48,54,61,0.2); }

    .timeline-label {
      width: 180px;
      min-width: 180px;
      padding: 2px 10px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }
    .timeline-label-indent { flex-shrink: 0; }
    .timeline-label-icon { flex-shrink: 0; font-size: 10px; }
    .timeline-label-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .timeline-label-text.done { opacity: 0.5; text-decoration: line-through; }
    .timeline-label-text.in_progress { color: var(--yellow); }

    .timeline-bar-area {
      flex: 1;
      position: relative;
      height: 28px;
      min-width: 200px;
    }

    /* Vertical gridlines behind bars */
    .timeline-gridline {
      position: absolute;
      top: 0;
      bottom: 0;
      border-left: 1px dashed rgba(48,54,61,0.6);
      pointer-events: none;
    }

    .timeline-bar {
      position: absolute;
      top: 6px;
      height: 16px;
      border-radius: 3px;
      min-width: 3px;
      display: flex;
      align-items: center;
      padding: 0 4px;
      font-size: 9px;
      font-family: 'Menlo', 'Consolas', monospace;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      overflow: hidden;
    }
    .timeline-bar.status-done {
      background: linear-gradient(90deg, #1a4d2e, #2a6e3f);
      border: 1px solid var(--green);
    }
    .timeline-bar.status-in_progress {
      background: linear-gradient(90deg, #4d3a0a, #6e520f);
      border: 1px solid var(--yellow);
    }
    .timeline-bar.status-in_progress .timeline-bar-stripe {
      position: absolute;
      inset: 0;
      border-radius: 3px;
      background: repeating-linear-gradient(
        -45deg,
        transparent, transparent 4px,
        rgba(255,255,255,0.06) 4px, rgba(255,255,255,0.06) 8px
      );
      animation: bar-stripe-move 1s linear infinite;
    }
    @keyframes bar-stripe-move {
      0%   { background-position: 0 0; }
      100% { background-position: 16px 0; }
    }
    .timeline-bar.status-open {
      background: var(--surface2);
      border: 1px dashed var(--border);
      opacity: 0.5;
    }

    .timeline-bar-duration {
      position: relative;
      z-index: 1;
    }

    /* Parallel bracket indicator */
    .timeline-parallel-badge {
      font-size: 9px;
      color: var(--purple);
      font-weight: 600;
      margin-left: 2px;
      letter-spacing: 0.3px;
    }

    .timeline-empty {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 24px 0;
    }

    /* Empty states */
    .empty { color: var(--muted); font-size: 12px; text-align: center; padding: 24px 0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>Agent Swarm</h1>
  <div class="status-dot" id="status-dot"></div>
  <span class="status-label" id="status-label">connecting…</span>
  <button id="clear-all-btn" style="margin-left:auto; border-color: var(--red); color: var(--red);" title="Clear all tasks, artifacts, logs, and conversations">Clear All</button>
</header>

<main>

  <!-- Tasks: top-left -->
  <div id="tasks-panel">
    <div class="panel-title">
      <span>Tasks</span>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-kanban">Kanban</button>
        <button class="view-btn" id="btn-dag">DAG</button>
        <button class="view-btn" id="btn-timeline">Timeline</button>
      </div>
    </div>
    <div class="kanban" id="kanban-view">
      <div class="kanban-col">
        <div class="col-header">
          <span style="color:var(--muted)">○</span> Open
          <span class="col-count" id="cnt-open">0</span>
        </div>
        <div class="col-cards" id="col-open"></div>
      </div>
      <div class="kanban-col">
        <div class="col-header">
          <span style="color:var(--yellow)">◷</span> In Progress
          <span class="col-count" id="cnt-in_progress">0</span>
        </div>
        <div class="col-cards" id="col-in_progress"></div>
      </div>
      <div class="kanban-col">
        <div class="col-header">
          <span style="color:var(--green)">✓</span> Done
          <span class="col-count" id="cnt-done">0</span>
        </div>
        <div class="col-cards" id="col-done"></div>
      </div>
    </div>
    <div class="dag-view" id="dag-view" style="display:none"></div>
    <div class="timeline-view" id="timeline-view" style="display:none"></div>
  </div>

  <!-- Artifacts: top-right -->
  <div id="artifacts-panel">
    <div class="panel-title">Artifacts</div>
    <div class="artifacts-list" id="artifacts-pane"></div>
  </div>

  <!-- Chat: bottom-left -->
  <div id="chat-panel">
    <div class="chat-header">
      <label for="agent-sel">Agent</label>
      <select id="agent-sel"></select>
      <button id="reset-btn" title="Clear chat history">Reset</button>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-footer">
      <input id="chat-input" placeholder="Message…" autocomplete="off">
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- Logs: bottom-right -->
  <div id="logs-panel">
    <div class="panel-title">Logs</div>
    <div id="logs-pane"></div>
  </div>

</main>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const taskStatus = {};   // taskId → last known status (for flash detection)
  const savedView = localStorage.getItem('taskView');
  let viewMode = ['dag','kanban','timeline'].includes(savedView) ? savedView : 'kanban';
  let es = null;

  // ── Elements ───────────────────────────────────────────────────────────────
  const dot         = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');
  const agentSel    = document.getElementById('agent-sel');
  const chatMsgs    = document.getElementById('chat-messages');
  const chatInput   = document.getElementById('chat-input');
  const sendBtn     = document.getElementById('send-btn');
  const resetBtn    = document.getElementById('reset-btn');
  const clearAllBtn = document.getElementById('clear-all-btn');
  const logsPane    = document.getElementById('logs-pane');
  const artPane     = document.getElementById('artifacts-pane');


  // ── Boot ───────────────────────────────────────────────────────────────────
  async function init() {
    await Promise.all([loadAgents(), loadTasks(), loadArtifacts()]);
    connectSSE();
  }

  async function loadAgents() {
    const agents = await fetch('/api/agents').then(r => r.json()).catch(() => []);
    agentSel.innerHTML = agents
      .map(a => `<option value="${esc(a.name)}" title="${esc(a.description)}">${esc(a.name)}</option>`)
      .join('');
    if (agents.find(a => a.name === 'manager')) agentSel.value = 'manager';
  }

  async function loadTasks() {
    const tasks = await fetch('/api/tasks').then(r => r.json()).catch(() => []);
    renderTasks(tasks);
  }

  async function loadArtifacts() {
    const arts = await fetch('/api/artifacts').then(r => r.json()).catch(() => []);
    renderArtifacts(arts);
  }

  // ── SSE ────────────────────────────────────────────────────────────────────
  function connectSSE() {
    if (es) es.close();
    es = new EventSource('/api/events');

    es.onopen = () => {
      dot.classList.add('live');
      statusLabel.textContent = 'live';
    };
    es.onerror = () => {
      dot.classList.remove('live');
      statusLabel.textContent = 'reconnecting…';
      es.close();
      setTimeout(connectSSE, 3000);
    };

    es.addEventListener('tasks',     e => renderTasks(JSON.parse(e.data)));
    es.addEventListener('artifacts', e => renderArtifacts(JSON.parse(e.data)));
    es.addEventListener('log',       e => appendLog(JSON.parse(e.data)));
  }

  // ── Tasks ──────────────────────────────────────────────────────────────────
  function renderTasks(tasks) {
    // Build changed set for flash animation
    const changed = new Set();
    for (const t of tasks) {
      if (taskStatus[t.id] !== undefined && taskStatus[t.id] !== t.status) {
        changed.add(t.id);
      }
      taskStatus[t.id] = t.status;
    }

    if (viewMode === 'dag') {
      renderDag(tasks, changed);
    } else if (viewMode === 'timeline') {
      renderTimeline(tasks, changed);
    } else {
      renderKanban(tasks, changed);
    }
  }

  function renderKanban(tasks, changed) {
    const byStatus = { open: [], in_progress: [], done: [] };
    for (const t of tasks) {
      if (byStatus[t.status]) byStatus[t.status].push(t);
    }

    for (const status of ['open', 'in_progress', 'done']) {
      const col   = document.getElementById('col-' + status);
      const count = document.getElementById('cnt-' + status);
      count.textContent = byStatus[status].length;
      col.innerHTML = '';

      for (const t of byStatus[status]) {
        const card = document.createElement('div');
        card.className = `task-card status-${t.status}${changed.has(t.id) ? ' flash' : ''}`;
        card.innerHTML =
          `<div class="task-id">${esc(t.id)}</div>` +
          `<div class="task-title">${esc(t.title)}</div>` +
          `<div class="task-meta">${t.assignee ? 'assigned to ' + esc(t.assignee) : 'posted by ' + esc(t.postedBy)}</div>` +
          (t.result ? `<div class="task-result">${esc(clip(t.result, 90))}</div>` : '');
        col.appendChild(card);
      }
    }
  }

  function renderDag(tasks, changed) {
    const dagView = document.getElementById('dag-view');
    dagView.innerHTML = '';

    if (!tasks.length) {
      dagView.innerHTML = '<div class="empty">No tasks</div>';
      return;
    }

    const taskMap = new Map(tasks.map(t => [t.id, t]));

    // Build parent → children map
    const childrenOf = new Map(); // parentId → [task]
    const roots = [];             // tasks with no parentId

    for (const t of tasks) {
      if (t.parentId && taskMap.has(t.parentId)) {
        if (!childrenOf.has(t.parentId)) childrenOf.set(t.parentId, []);
        childrenOf.get(t.parentId).push(t);
      } else if (!t.parentId) {
        roots.push(t);
      } else {
        roots.push(t); // parent not in set, treat as root
      }
    }

    // Sort children by siblingIndex
    for (const [, children] of childrenOf) {
      children.sort((a, b) => (a.siblingIndex ?? 0) - (b.siblingIndex ?? 0));
    }
    roots.sort((a, b) => (a.siblingIndex ?? 0) - (b.siblingIndex ?? 0));

    // Group roots by projectId
    const byProject = new Map();
    for (const t of roots) {
      const key = t.projectId || '';
      if (!byProject.has(key)) byProject.set(key, []);
      byProject.get(key).push(t);
    }

    const statusIcon = { done: '✓', in_progress: '◷', open: '○' };

    // Render a group of siblings as either ordered (sequential) or unordered (parallel)
    function renderSiblings(siblings, container, depth, visited = new Set()) {
      if (!siblings || siblings.length === 0) return;
      const isSequential = siblings[0].siblingSequential;

      const list = document.createElement(isSequential ? 'ol' : 'ul');
      list.className = 'dag-list' + (depth === 0 ? ' dag-list-root' : '');

      if (!isSequential && siblings.length > 1 && depth > 0) {
        const plabel = document.createElement('div');
        plabel.className = 'dag-parallel-label';
        plabel.textContent = '\u21C6 parallel';
        container.appendChild(plabel);
      }

      for (let i = 0; i < siblings.length; i++) {
        const t = siblings[i];
        if (visited.has(t.id)) continue;
        visited.add(t.id);

        const icon = statusIcon[t.status] || '○';
        const li = document.createElement('li');
        li.className = `dag-item${changed.has(t.id) ? ' flash' : ''}${t.isContainer ? ' dag-container' : ''}`;
        li.title = t.id + (t.result ? ': ' + t.result : '');

        li.innerHTML =
          `<span class="dag-icon ${esc(t.status)}">${icon}</span>` +
          `<span class="dag-title ${esc(t.status)}">${esc(t.title)}</span>` +
          (t.assignee && !t.isContainer ? `<span class="dag-assignee">${esc(t.assignee)}</span>` : '');

        list.appendChild(li);

        // Recurse into children
        const children = childrenOf.get(t.id);
        if (children && children.length > 0) {
          renderSiblings(children, li, depth + 1, new Set(visited));
        }
      }

      container.appendChild(list);
    }

    // Render each project group
    for (const [projectId, projectRoots] of byProject) {
      let container = dagView;
      if (projectId) {
        const group = document.createElement('div');
        group.className = 'dag-project';
        const label = document.createElement('div');
        label.className = 'dag-project-label';
        label.textContent = 'project: ' + projectId;
        group.appendChild(label);
        dagView.appendChild(group);
        container = group;
      }
      renderSiblings(projectRoots, container, 0);
    }

    // Fallback for legacy tasks without parentId/siblingIndex (flat dependsOn style)
    const rendered = new Set();
    dagView.querySelectorAll('.dag-item').forEach(el => rendered.add(el.title.split(':')[0]));
    const unrendered = tasks.filter(t => !rendered.has(t.id));
    if (unrendered.length > 0 && rendered.size === 0) {
      // All tasks are legacy — fall back to flat list
      const list = document.createElement('ul');
      list.className = 'dag-list dag-list-root';
      for (const t of unrendered) {
        const icon = statusIcon[t.status] || '○';
        const li = document.createElement('li');
        li.className = `dag-item${changed.has(t.id) ? ' flash' : ''}`;
        li.title = t.id + (t.result ? ': ' + t.result : '');
        li.innerHTML =
          `<span class="dag-icon ${esc(t.status)}">${icon}</span>` +
          `<span class="dag-title ${esc(t.status)}">${esc(t.title)}</span>` +
          (t.assignee ? `<span class="dag-assignee">${esc(t.assignee)}</span>` : '');
        list.appendChild(li);
      }
      dagView.appendChild(list);
    }
  }

  // ── Timeline (waterfall) ──────────────────────────────────────────────────
  function renderTimeline(tasks, changed) {
    const view = document.getElementById('timeline-view');
    view.innerHTML = '';

    // Filter to leaf tasks (non-container) that have timing data
    const leafTasks = tasks.filter(t => !t.isContainer);
    if (!leafTasks.length) {
      view.innerHTML = '<div class="timeline-empty">No tasks</div>';
      return;
    }

    const now = Date.now();

    // Extract a fallback timestamp from projectId (e.g. "proj-1774087794950")
    function inferTimestamp(t) {
      if (t.createdAt) return new Date(t.createdAt).getTime();
      if (t.startedAt) return new Date(t.startedAt).getTime();
      if (t.projectId) {
        const m = t.projectId.match(/(\d{13,})/);
        if (m) return parseInt(m[1]);
      }
      return null;
    }

    // Compute time bounds across all tasks
    let minTime = Infinity, maxTime = -Infinity;
    for (const t of leafTasks) {
      const start = t.startedAt ? new Date(t.startedAt).getTime() : inferTimestamp(t);
      const end = t.completedAt ? new Date(t.completedAt).getTime() : (t.startedAt ? now : null);
      if (start !== null && start < minTime) minTime = start;
      if (end !== null && end > maxTime) maxTime = end;
      if (start !== null && start > maxTime) maxTime = start;
    }

    // If no timing data at all, show a helpful message
    if (minTime === Infinity) {
      view.innerHTML = '<div class="timeline-empty">No timing data yet — run a project to see the timeline</div>';
      return;
    }

    const totalSpan = Math.max(maxTime - minTime, 1000); // at least 1s
    const padded = totalSpan * 1.05; // 5% padding on right

    // Build task map and flatten in DAG order
    const taskMap = new Map(tasks.map(t => [t.id, t]));
    const childrenOf = new Map();
    const roots = [];
    for (const t of tasks) {
      if (t.parentId && taskMap.has(t.parentId)) {
        if (!childrenOf.has(t.parentId)) childrenOf.set(t.parentId, []);
        childrenOf.get(t.parentId).push(t);
      } else {
        roots.push(t);
      }
    }
    for (const [, children] of childrenOf) {
      children.sort((a, b) => (a.siblingIndex ?? 0) - (b.siblingIndex ?? 0));
    }
    roots.sort((a, b) => (a.siblingIndex ?? 0) - (b.siblingIndex ?? 0));

    // Flatten into ordered rows with depth info
    const rows = [];
    function flatten(items, depth, parentSequential) {
      if (!items) return;
      const isSeq = items[0]?.siblingSequential;
      for (const t of items) {
        const isParallel = !isSeq && items.length > 1;
        rows.push({ task: t, depth, isParallel });
        const kids = childrenOf.get(t.id);
        if (kids && kids.length > 0) flatten(kids, depth + 1, isSeq);
      }
    }
    flatten(roots, 0, false);

    // Compute tick marks
    const tickCount = 6;
    const ticks = [];
    for (let i = 0; i <= tickCount; i++) {
      const t = minTime + (padded * i / tickCount);
      ticks.push({ pct: (i / tickCount) * 100, time: t });
    }

    function fmtDuration(ms) {
      if (ms < 1000) return ms + 'ms';
      if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
      return (ms / 60000).toFixed(1) + 'm';
    }

    function fmtTickTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    const statusIcon = { done: '\u2713', in_progress: '\u25F7', open: '\u25CB' };

    // Header
    const header = document.createElement('div');
    header.className = 'timeline-header';
    const headerLabel = document.createElement('div');
    headerLabel.className = 'timeline-header-label';
    headerLabel.textContent = 'Task';
    header.appendChild(headerLabel);

    const ruler = document.createElement('div');
    ruler.className = 'timeline-ruler';
    for (const tick of ticks) {
      const el = document.createElement('div');
      el.className = 'timeline-tick';
      el.style.left = tick.pct + '%';
      const lbl = document.createElement('span');
      lbl.className = 'timeline-tick-label';
      lbl.textContent = fmtTickTime(tick.time);
      el.appendChild(lbl);
      ruler.appendChild(el);
    }
    header.appendChild(ruler);
    view.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'timeline-body';

    for (const { task: t, depth, isParallel } of rows) {
      const row = document.createElement('div');
      row.className = 'timeline-row' + (t.isContainer ? ' is-container' : '');

      // Label column
      const label = document.createElement('div');
      label.className = 'timeline-label';
      if (depth > 0) {
        const indent = document.createElement('span');
        indent.className = 'timeline-label-indent';
        indent.style.width = (depth * 12) + 'px';
        label.appendChild(indent);
      }
      const icon = document.createElement('span');
      icon.className = 'timeline-label-icon ' + t.status;
      icon.style.color = t.status === 'done' ? 'var(--green)' : t.status === 'in_progress' ? 'var(--yellow)' : 'var(--muted)';
      icon.textContent = statusIcon[t.status] || '\u25CB';
      label.appendChild(icon);

      const text = document.createElement('span');
      text.className = 'timeline-label-text ' + t.status;
      text.textContent = t.title;
      text.title = t.id + ' — ' + t.title;
      label.appendChild(text);

      if (isParallel && !t.isContainer) {
        const badge = document.createElement('span');
        badge.className = 'timeline-parallel-badge';
        badge.textContent = 'PARALLEL';
        label.appendChild(badge);
      }

      row.appendChild(label);

      // Bar area
      const barArea = document.createElement('div');
      barArea.className = 'timeline-bar-area';

      // Gridlines
      for (const tick of ticks) {
        const gl = document.createElement('div');
        gl.className = 'timeline-gridline';
        gl.style.left = tick.pct + '%';
        barArea.appendChild(gl);
      }

      // Render bar if timing data exists
      if (!t.isContainer) {
        const start = t.startedAt ? new Date(t.startedAt).getTime() : inferTimestamp(t);
        const end = t.completedAt ? new Date(t.completedAt).getTime() : (t.startedAt ? now : null);

        if (start !== null && end !== null) {
          const leftPct = ((start - minTime) / padded) * 100;
          const widthPct = ((end - start) / padded) * 100;

          const bar = document.createElement('div');
          bar.className = 'timeline-bar status-' + t.status;
          bar.style.left = Math.max(0, leftPct) + '%';
          bar.style.width = Math.max(0.5, widthPct) + '%';
          bar.title = t.title + ' — ' + fmtDuration(end - start) + (t.assignee ? ' (' + t.assignee + ')' : '');

          if (t.status === 'in_progress') {
            const stripe = document.createElement('div');
            stripe.className = 'timeline-bar-stripe';
            bar.appendChild(stripe);
          }

          const durLabel = document.createElement('span');
          durLabel.className = 'timeline-bar-duration';
          durLabel.textContent = fmtDuration(end - start);
          bar.appendChild(durLabel);

          barArea.appendChild(bar);
        } else if (start !== null) {
          // Task with a start/creation time but no end — show a marker
          const leftPct = ((start - minTime) / padded) * 100;
          const bar = document.createElement('div');
          bar.className = 'timeline-bar status-' + (t.status || 'open');
          bar.style.left = Math.max(0, leftPct) + '%';
          bar.style.width = '8px';
          bar.title = t.title + ' (' + (t.status || 'open') + ')';
          barArea.appendChild(bar);
        }
      }

      row.appendChild(barArea);
      body.appendChild(row);
    }

    view.appendChild(body);
  }

  // ── Artifacts ──────────────────────────────────────────────────────────────
  function renderArtifacts(arts) {
    if (!arts.length) {
      artPane.innerHTML = '<div class="empty">No artifacts yet</div>';
      return;
    }
    artPane.innerHTML = '';
    for (const a of arts) {
      const short = clip(a.value, 120);
      const card = document.createElement('div');
      card.className = 'artifact-card';
      card.innerHTML =
        `<div class="artifact-key">${esc(a.key)}</div>` +
        `<div class="artifact-meta">by ${esc(a.author)} · ${fmtTime(a.timestamp)}</div>` +
        `<div class="artifact-val" data-full="${esc(a.value)}" data-short="${esc(short)}">${esc(short)}</div>`;
      card.querySelector('.artifact-val').addEventListener('click', function () {
        const expanded = this.classList.toggle('expanded');
        this.textContent = expanded ? this.dataset.full : this.dataset.short;
      });
      artPane.appendChild(card);
    }
  }

  // ── Logs ───────────────────────────────────────────────────────────────────
  function appendLog(ev) {
    const type = ev.type || 'info';
    let msg = '';
    if (type === 'tool')             msg = `${ev.data.tool}  ${clipArgs(ev.data.args)}`;
    else if (type === 'response')    msg = clip(ev.data.text || '', 100);
    else if (type === 'trigger')     msg = `[${ev.data.source}]`;
    else if (type === 'delegation_start') msg = `→ delegating`;
    else if (type === 'delegation_end')   msg = `← done`;
    else if (type === 'startup')     msg = ev.data.description || '';
    else                             msg = clip(JSON.stringify(ev.data), 80);

    const row = document.createElement('div');
    row.className = 'log-row';
    row.innerHTML =
      `<span class="log-time">${fmtTime(ev.timestamp)}</span>` +
      `<span class="log-agent">${esc(ev.agent)}</span>` +
      `<span class="log-type ${esc(type)}">${esc(type)}</span>` +
      `<span class="log-msg" title="${esc(msg)}">${esc(msg)}</span>`;

    logsPane.appendChild(row);
    logsPane.scrollTop = logsPane.scrollHeight;
  }

  // ── Chat ───────────────────────────────────────────────────────────────────
  async function sendChat() {
    const text = chatInput.value.trim();
    if (!text || sendBtn.disabled) return;

    const agent = agentSel.value;
    chatInput.value = '';
    sendBtn.disabled = true;

    addMsg('user', text);
    const spinner = addSpinner();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent, message: text }),
      });
      const data = await res.json();
      spinner.remove();
      addMsg('assistant', data.error != null ? ('Error: ' + data.error) : (data.response || '(no response)'), agent);
    } catch (err) {
      spinner.remove();
      addMsg('system', 'Network error: ' + err.message);
    } finally {
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  function addMsg(role, text, agent = null) {
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    if (role === 'assistant' && agent) {
      el.innerHTML = `<div class="msg-label">${esc(agent)}</div>${esc(text)}`;
    } else {
      el.textContent = text;
    }
    chatMsgs.appendChild(el);
    chatMsgs.scrollTop = chatMsgs.scrollHeight;
    return el;
  }

  function addSpinner() {
    const el = document.createElement('div');
    el.className = 'msg system';
    el.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
    chatMsgs.appendChild(el);
    chatMsgs.scrollTop = chatMsgs.scrollHeight;
    return el;
  }

  // ── View toggle ────────────────────────────────────────────────────────────
  function applyViewMode() {
    document.getElementById('btn-kanban').classList.toggle('active', viewMode === 'kanban');
    document.getElementById('btn-dag').classList.toggle('active', viewMode === 'dag');
    document.getElementById('btn-timeline').classList.toggle('active', viewMode === 'timeline');
    document.getElementById('kanban-view').style.display = viewMode === 'kanban' ? '' : 'none';
    document.getElementById('dag-view').style.display = viewMode === 'dag' ? '' : 'none';
    document.getElementById('timeline-view').style.display = viewMode === 'timeline' ? '' : 'none';
  }

  applyViewMode();

  for (const mode of ['kanban', 'dag', 'timeline']) {
    document.getElementById('btn-' + mode).addEventListener('click', () => {
      viewMode = mode;
      localStorage.setItem('taskView', mode);
      applyViewMode();
      loadTasks();
    });
  }

  // ── Controls ───────────────────────────────────────────────────────────────
  sendBtn.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });

  clearAllBtn.addEventListener('click', async () => {
    if (!confirm('Clear all tasks, artifacts, logs, and conversations?')) return;
    await fetch('/api/clear', { method: 'POST' }).catch(() => {});
    logsPane.innerHTML = '';
    chatMsgs.innerHTML = '';
    Object.keys(taskStatus).forEach(k => delete taskStatus[k]);
    addMsg('system', 'All data cleared.');
  });

  resetBtn.addEventListener('click', async () => {
    const agent = agentSel.value;
    await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent, message: 'hello', reset: true }),
    }).catch(() => {});
    chatMsgs.innerHTML = '';
    addMsg('system', `Conversation with "${agent}" reset.`);
  });

  // ── Helpers ────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function clip(str, max) {
    const s = String(str ?? '').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
    return s.length > max ? s.slice(0, max) + '…' : s;
  }

  function clipArgs(args) {
    if (!args) return '';
    const s = JSON.stringify(args);
    return s.length > 60 ? s.slice(0, 60) + '…' : s;
  }

  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  init();
</script>
</body>
</html>
